<script type="text/babel">
const { useState, useEffect, useLayoutEffect, useRef } = React;

if (typeof gsap !== 'undefined') {
  if (typeof ScrollTrigger !== 'undefined') gsap.registerPlugin(ScrollTrigger);
  if (typeof SplitText !== 'undefined') gsap.registerPlugin(SplitText);
  if (typeof ScrambleTextPlugin !== 'undefined') gsap.registerPlugin(ScrambleTextPlugin);
}

/* ── ASCII reveal — left to right, 9 randomisations per char, 2s total ── */
const SPECIAL = '!@#$%&|<>{}░▒▓×±§÷¶~^*_+=[]/?\\';

function useAsciiReveal(text, totalMs=2000, active=true) {
  const [state, setState] = useState({
    chars: Array.from(text).map(c => c===' ' ? ' ' : ' '),
    cursorIdx: 0,
    done: false,
  });

  useEffect(() => {
    const RAND = 6;
    const perChar = totalMs / text.length;
    const perFrame = perChar / (RAND + 1);
    const ts = [];

    for (let step = 0; step < text.length; step++) {
      const i = step; // left → right
      const base = step * perChar;

      if (text[i] === ' ') {
        ts.push(setTimeout(() =>
          setState(prev => {
            const chars = [...prev.chars]; chars[i] = ' ';
            return { chars, cursorIdx: i + 1, done: i === text.length - 1 };
          }), base));
      } else {
        for (let r = 0; r < RAND; r++) {
          ts.push(setTimeout(() =>
            setState(prev => {
              const chars = [...prev.chars];
              chars[i] = SPECIAL[Math.floor(Math.random() * SPECIAL.length)];
              return { chars, cursorIdx: i, done: false };
            }), base + r * perFrame));
        }
        ts.push(setTimeout(() =>
          setState(prev => {
            const chars = [...prev.chars]; chars[i] = text[i];
            return { chars, cursorIdx: i + 1, done: i === text.length - 1 };
          }), base + RAND * perFrame));
      }
    }
    return () => ts.forEach(clearTimeout);
    if (!active) return;
  }, [text, totalMs, active]);

  return state;
}

function AsciiReveal({ text, style, active=true, getColor=null }) {
  const { chars, cursorIdx, done } = useAsciiReveal(text, 2000, active);
  const isCursor = (i) => active && !done && i === cursorIdx;
  return (
    <span style={style}>
      {Array.from(text).map((_, i) => (
        <span key={i} style={{
          background: isCursor(i) ? 'var(--secondary)' : 'transparent',
          color: isCursor(i) ? 'var(--bg)' : getColor ? getColor(i) : 'inherit',
        }}>
          {chars[i]}
        </span>
      ))}
    </span>
  );
}

/* ── PixelRevealImg — digitising pixel reveal animation ── */
function PixelRevealImg({ src, alt, style = {}, externalTrigger = false, delay = 0 }) {
  const containerRef = useRef(null);
  const imgRef       = useRef(null);
  const revealRef    = useRef(null);  // reveal canvas
  const hoverRef     = useRef(null);  // hover pixel canvas
  const mouseRef     = useRef({ x: -9999, y: -9999 });
  const hoveredRef   = useRef(false);
  const hoverRafRef  = useRef(null);
  const [ready,  setReady]  = useState(false);
  const [inView, setInView] = useState(false);

  const PX = 16;

  // IntersectionObserver — skip if externalTrigger controls inView
  useEffect(() => {
    if (externalTrigger) return; // controlled externally
    const el = containerRef.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold: 0.45 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [externalTrigger]);

  // Accept external trigger
  useEffect(() => {
    if (externalTrigger) setInView(true);
  }, [externalTrigger]);

  // ── Pixel reveal on load + in-view ──
  useEffect(() => {
    if (!ready || !inView) return;
    const img    = imgRef.current;
    const canvas = revealRef.current;
    if (!img || !canvas) return;
    const W = img.offsetWidth, H = img.offsetHeight;
    if (!W || !H) return;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const BG = document.body.classList.contains('dark') ? '#121010' : '#1A1A1A';
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    img.style.opacity = 1;
    const cols = Math.ceil(W / PX), rows = Math.ceil(H / PX);
    const blocks = [];
    for (let r = 0; r < rows; r++)
      for (let cl = 0; cl < cols; cl++)
        blocks.push({ r, c: cl, d: r + cl });
    blocks.sort((a, b) => (a.d + (Math.random()-0.5)*4) - (b.d + (Math.random()-0.5)*4));
    const total = blocks.length, DURATION = 600;
    let next = 0, start = null, raf;
    const tick = (now) => {
      if (!start) start = now;
      const tp = Math.min((now - start) / DURATION, 1);
      const target = Math.floor(tp * total);
      while (next < target) { const { r, c } = blocks[next++]; ctx.clearRect(c * PX, r * PX, PX, PX); }
      if (tp < 1) raf = requestAnimationFrame(tick);
      else canvas.style.display = 'none';
    };
    const t = setTimeout(() => { raf = requestAnimationFrame(tick); }, delay * 1000);
    return () => { clearTimeout(t); cancelAnimationFrame(raf); };
  }, [ready, inView]);

  // ── Hover: pixelation ramp 1→16 over 1s + zoom + cursor displacement ──
  useEffect(() => {
    if (!ready) return;
    const container = containerRef.current;
    const img    = imgRef.current;
    const canvas = hoverRef.current;
    if (!container || !img || !canvas) return;

    const W = img.offsetWidth, H = img.offsetHeight;
    if (!W || !H) return;
    canvas.width = W; canvas.height = H;

    const ctx    = canvas.getContext('2d');
    const smpl   = document.createElement('canvas'); // off-screen sampler
    const sctx   = smpl.getContext('2d');
    const RAMP   = 1000; // ms — 1→16 ramp duration
    const MAX_PX = PX; // 16

    let enterTime = null, leaveTime = null;
    const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out
    const mounted = { v: true };

    const loop = (now) => {
      if (!mounted.v) return;
      const isHov = hoveredRef.current;
      if (isHov && !enterTime) { enterTime = now; leaveTime = null; }
      if (!isHov && !leaveTime) { leaveTime = now; enterTime = null; }

      // Pixelation progress: ramp up on enter, ramp down on leave
      const rampUp   = enterTime ? Math.min((now - enterTime) / RAMP, 1) : 0;
      const rampDown = leaveTime ? Math.min((now - leaveTime) / (RAMP * 0.5), 1) : 0;
      const prog     = isHov ? ease(rampUp) : ease(1 - rampDown);

      if (!isHov && prog <= 0) {
        // Fully de-pixelated — stop
        ctx.clearRect(0, 0, W, H);
        img.style.transform = '';
        img.style.opacity = '1';
        hoverRafRef.current = null;
        return;
      }

      // Current pixel block size: 1 → 16
      const curPX  = Math.max(1, Math.round(1 + (MAX_PX - 1) * prog));
      // Zoom proportional to pixelation
      img.style.transform   = `scale(${1 + prog * 0.06})`;
      img.style.transition  = 'none';

      ctx.clearRect(0, 0, W, H);
      ctx.imageSmoothingEnabled = false;

      // Step 1 — draw full pixelated image (fast)
      const cCols = Math.ceil(W / curPX), cRows = Math.ceil(H / curPX);
      smpl.width = cCols; smpl.height = cRows;
      sctx.drawImage(img, 0, 0, cCols, cRows);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(smpl, 0, 0, cCols, cRows, 0, 0, W, H);

      hoverRafRef.current = requestAnimationFrame(loop);
    };

    const onEnter = () => {
      hoveredRef.current = true;
      img.style.opacity = '0';
      if (!hoverRafRef.current) hoverRafRef.current = requestAnimationFrame(loop);
    };
    const onLeave = (e) => {
      // Keep effect active if cursor moved to a sibling inside the same .wc card (e.g. the CTA button)
      const card = container.closest('.wc');
      if (card && card.contains(e.relatedTarget)) return;
      hoveredRef.current = false; mouseRef.current = { x:-9999, y:-9999 };
    };
    const onMove  = e  => {
      const r = canvas.getBoundingClientRect();
      mouseRef.current = { x: e.clientX - r.left, y: e.clientY - r.top };
    };

    container.addEventListener('mouseenter', onEnter);
    container.addEventListener('mouseleave', onLeave);
    container.addEventListener('mousemove',  onMove);
    return () => {
      mounted.v = false;
      container.removeEventListener('mouseenter', onEnter);
      container.removeEventListener('mouseleave', onLeave);
      container.removeEventListener('mousemove',  onMove);
      cancelAnimationFrame(hoverRafRef.current);
    };
  }, [ready]);

  return (
    <div ref={containerRef} style={{ position: 'relative', lineHeight: 0, overflow: 'hidden', borderRadius: 4, background: '#1A1A1A', ...style }}>
      <img
        ref={imgRef}
        src={src}
        alt={alt}
        draggable={false}
        onDragStart={e=>e.preventDefault()}
        crossOrigin="anonymous"
        onLoad={() => setReady(true)}
        style={{ display: 'block', width: '100%', height: 'auto', opacity: 0 }}
      />
      <canvas ref={revealRef} style={{ position: 'absolute', top: 0, left: 0, pointerEvents: 'none' }} />
      <canvas ref={hoverRef}  style={{ position: 'absolute', top: 0, left: 0, pointerEvents: 'none' }} />
    </div>
  );
}

/* ── PixelResolveVideo — reverse hover effect: starts fully pixelated, resolves to clear ── */
function PixelResolveVideo({ src, videoRef: externalVideoRef, videoProps={}, style={}, externalTrigger=false }) {
  const containerRef     = useRef(null);
  const internalVideoRef = useRef(null);
  const canvasRef        = useRef(null);
  const rafRef           = useRef(null);
  const [ready, setReady] = useState(false);
  const PX   = 16;
  const RAMP = 1200;

  const setVideoRef = (el) => {
    internalVideoRef.current = el;
    if (typeof externalVideoRef === 'function') externalVideoRef(el);
    else if (externalVideoRef && 'current' in externalVideoRef) externalVideoRef.current = el;
  };

  const drawAt = (ctx, smpl, sctx, video, W, H, curPX) => {
    ctx.clearRect(0, 0, W, H);
    ctx.imageSmoothingEnabled = false;
    smpl.width  = Math.ceil(W / curPX);
    smpl.height = Math.ceil(H / curPX);

    // Replicate objectFit:cover — scale to fill, crop centre
    const vW = video.videoWidth  || W;
    const vH = video.videoHeight || H;
    const scale = Math.max(W / vW, H / vH);
    const dW = vW * scale, dH = vH * scale;
    const sx = (dW - W) / 2 / scale;   // source x in video coords
    const sy = (dH - H) / 2 / scale;   // source y in video coords
    const sw = W / scale;               // visible width  in video coords
    const sh = H / scale;               // visible height in video coords

    sctx.drawImage(video, sx, sy, sw, sh, 0, 0, smpl.width, smpl.height);
    ctx.drawImage(smpl, 0, 0, smpl.width, smpl.height, 0, 0, W, H);
  };

  const visibleRef = useRef(false);

  // WAITING loop — continuously sample video at full pixelation until trigger fires.
  // Runs whenever ready=true and externalTrigger=false.
  useEffect(() => {
    if (!ready || externalTrigger) return;
    cancelAnimationFrame(rafRef.current);
    const canvas = canvasRef.current;
    const video  = internalVideoRef.current;
    if (!canvas || !video) return;
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    if (!W || !H) return;
    canvas.width = W; canvas.height = H;
    const ctx  = canvas.getContext('2d');
    const smpl = document.createElement('canvas');
    const sctx = smpl.getContext('2d');
    const loop = () => {
      drawAt(ctx, smpl, sctx, video, W, H, PX);
      rafRef.current = requestAnimationFrame(loop);
    };
    const startLoop = () => { cancelAnimationFrame(rafRef.current); rafRef.current = requestAnimationFrame(loop); };
    const stopLoop  = () => { cancelAnimationFrame(rafRef.current); };

    // Only run rAF when container is visible
    const obs = new IntersectionObserver(([entry]) => {
      visibleRef.current = entry.isIntersecting;
      if (entry.isIntersecting) {
        startLoop();
      } else {
        stopLoop();
      }
    }, { threshold: 0 });
    if (containerRef.current) obs.observe(containerRef.current);

    if (visibleRef.current) startLoop();

    return () => { stopLoop(); obs.disconnect(); };
  }, [ready, externalTrigger]);

  // RESOLVE animation — pixelate 16→1 using same technique as work-card hover.
  useEffect(() => {
    if (!externalTrigger || !ready) return;
    cancelAnimationFrame(rafRef.current);
    const canvas = canvasRef.current;
    const video  = internalVideoRef.current;
    if (!canvas || !video) return;
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    if (!W || !H) return;
    canvas.width = W; canvas.height = H;
    const ctx  = canvas.getContext('2d');
    const smpl = document.createElement('canvas');
    const sctx = smpl.getContext('2d');
    const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    let start = null;
    const tick = (now) => {
      if (!start) start = now;
      const tp    = Math.min((now - start) / RAMP, 1);
      const prog  = ease(1 - tp);
      const curPX = Math.max(1, Math.round(1 + (PX - 1) * prog));
      drawAt(ctx, smpl, sctx, video, W, H, curPX);
      if (tp < 1) { rafRef.current = requestAnimationFrame(tick); }
      else        { ctx.clearRect(0, 0, W, H); } // transparent — NO display:none avoids size shift
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [externalTrigger, ready]);

  return (
    <div ref={containerRef} style={{ position:'relative', width:'100%', height:'100%', ...style }}>
      <video
        ref={setVideoRef}
        src={src}
        onCanPlay={() => setReady(true)}
        {...videoProps}
        style={{ display:'block', width:'100%', height:'100%', ...(videoProps.style||{}) }}
      />
      <canvas ref={canvasRef} style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none' }} />
    </div>
  );
}

/* ── InViewAscii — triggers AsciiReveal when element enters viewport ── */
function InViewAscii({ text, style, getColor=null }) {
  const [active, setActive] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setActive(true); obs.disconnect(); } },
      { threshold: 0.15 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <span ref={ref} style={{display:'contents'}}>
      <AsciiReveal text={text} style={style} active={active} getColor={getColor} />
    </span>
  );
}

/* ── Eyebrow label (JetBrains Mono 12px) ── */
function Eyebrow({children,style={},center=true}) {
  const ref = useRef(null);

  useEffect(()=>{
    const el = ref.current;
    if (!el || typeof gsap==='undefined' || typeof ScrambleTextPlugin==='undefined') return;
    const text = String(children||'');
    const obs = new IntersectionObserver(([e])=>{
      if (!e.isIntersecting) return;
      obs.disconnect();
      gsap.to(el, {
        duration: 1.5, ease:'none',
        scrambleText:{ text, chars:'upperCase', revealDelay:0.3, speed:0.6 },
      });
    },{ threshold:0.5 });
    obs.observe(el);
    return ()=> obs.disconnect();
  },[]);

  return (
    <span
      ref={ref}
      dangerouslySetInnerHTML={{__html: String(children||'')}}
      style={{fontFamily:"var(--mono)",fontSize:"var(--eyebrow)",fontWeight:400,lineHeight:"100%",letterSpacing:"var(--eyebrow-ls)",color:"var(--static)",textAlign:center?"center":"left",...style}}
    />

}

/* ── ScrambleSpan — applies ScrambleText to any inline element on scroll-enter ── */
function ScrambleSpan({children, style={}, tag='span'}) {
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    if (!el || typeof gsap==='undefined' || typeof ScrambleTextPlugin==='undefined') return;
    const text = String(children||'');

    // Scroll-enter scramble (one-shot)
    const obs = new IntersectionObserver(([e])=>{
      if (!e.isIntersecting) return;
      obs.disconnect();
      gsap.to(el, { duration:1.5, ease:'none',
        scrambleText:{ text, chars:'upperCase', revealDelay:0.3, speed:0.6 },
      });
    },{ threshold:0.5 });
    obs.observe(el);

    // Hover scramble — lock width first so layout never shifts
    const lockAndScramble = () => {
      el.style.display    = 'inline-block';
      el.style.whiteSpace = 'nowrap';
      if (!el.style.width) el.style.width = el.offsetWidth + 'px';
      el.style.overflow   = 'hidden';
      gsap.to(el, { duration:0.5, ease:'none',
        scrambleText:{ text, chars:'upperCase', revealDelay:0.1, speed:0.8 },
      });
    };
    el.addEventListener('mouseenter', lockAndScramble);

    return ()=>{ obs.disconnect(); el.removeEventListener('mouseenter', lockAndScramble); };
  },[]);
  const Tag = tag;
  return React.createElement(Tag, {
    ref,
    dangerouslySetInnerHTML:{__html: String(children||'')},
    style,
  });
}

/* ── ContactPixels — grid-aligned corner pixel clusters matching Figma design ── */
const SVG_LOGOS = [
  'svgs/pattern_01.svg',
  'svgs/pattern_02.svg',
  'svgs/pattern_03.svg',
];

function ContactPixels({ dark }) {
  const canvasRef     = useRef(null);
  const darkRef       = useRef(dark);
  const scrollProgRef = useRef(0);

  useEffect(()=>{ darkRef.current = dark; }, [dark]);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if (!canvas) return;

    const CELL = 32;

    let W = 0, H = 0, particles = [], raf;

    // Preload SVG images
    let svgImgs = [];
    Promise.all(SVG_LOGOS.map(src => new Promise(res => {
      const img = new Image();
      img.onload = img.onerror = () => res(img);
      img.src = src;
    }))).then(imgs => { svgImgs = imgs; });

    // Deterministic hash
    const hash = (col, row) => {
      let h = (col * 2654435761 ^ row * 2246822519) >>> 0;
      h ^= h >>> 16; h = Math.imul(h, 0x45d9f3b); h ^= h >>> 16;
      return (h >>> 0) / 0xFFFFFFFF;
    };

    const init = () => {
      particles = [];
      const reach   = H * 0.67;
      const cols    = Math.ceil(reach / CELL);
      const rows    = Math.ceil(reach / CELL);
      const maxDist = Math.sqrt(cols*cols + rows*rows);

      ['tl','br'].forEach(corner => {
        for (let ci = 0; ci < cols; ci++) {
          for (let ri = 0; ri < rows; ri++) {
            const dist    = Math.sqrt(ci*ci + ri*ri);
            const invDist = (maxDist - dist) / maxDist;
            const prob    = Math.min(Math.pow(invDist, 1.6) * 1.6, 1);
            const h1 = hash(ci + (corner==='br'?1000:0), ri + (corner==='br'?1000:0));
            if (h1 > prob) continue;

            const totalCols = Math.floor(W / CELL);
            const totalRows = Math.floor(H / CELL);
            const hcol = corner==='tl' ? ci : totalCols - ci;
            const hrow = corner==='tl' ? ri : totalRows - ri;

            const h2 = hash(ci + (corner==='br'?2000:500), ri + (corner==='br'?2000:500));
            const isSvg = h2 < (corner==='tl' ? 0.38 : 0.18);
            const svgIdx = isSvg
              ? Math.floor(hash(ci + (corner==='br'?5000:3000), ri + (corner==='br'?5000:3000)) * SVG_LOGOS.length)
              : -1;

            // Random reveal threshold: spread staggered entry across 0→0.75 of scroll range
            const revealAt = hash(ci + (corner==='br'?6000:8000), ri + (corner==='br'?6000:8000)) * 0.95;

            particles.push({ hcol, hrow, col:hcol, row:hrow,
              cL:'#FDFEFF', cD:'#121010', isSvg, svgIdx, revealAt });
          }
        }
      });
    };

    const setSize = () => {
      W = canvas.offsetWidth; H = canvas.offsetHeight;
      if (!W || !H) return;
      canvas.width = W; canvas.height = H;
      init();
    };

    // ScrollTrigger: progress 0 when section enters bottom of viewport → 1 when section top hits top
    let st;
    if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
      const section = canvas.parentElement;
      st = ScrollTrigger.create({
        trigger: section,
        start: 'top bottom',
        end:   'top top',
        onUpdate: self => { scrollProgRef.current = self.progress; },
      });
    }

    const loop = () => {
      if (W && H) {
        const ctx      = canvas.getContext('2d');
        const isDark   = darkRef.current;
        const progress = scrollProgRef.current;
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          if (progress < p.revealAt) continue;
          const x = p.col * CELL, y = p.row * CELL;
          if (p.isSvg && svgImgs[p.svgIdx]?.complete) {
            ctx.drawImage(svgImgs[p.svgIdx], x, y, CELL, CELL);
          } else if (!p.isSvg) {
            ctx.fillStyle = isDark ? p.cD : p.cL;
            ctx.fillRect(x, y, CELL, CELL);
          }
        }
      }
      raf = requestAnimationFrame(loop);
    };

    const ro = new ResizeObserver(setSize);
    ro.observe(canvas);
    setSize();
    raf = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(raf);
      ro.disconnect();
      if (st) st.kill();
    };
  }, []);

  return (
    <canvas ref={canvasRef} style={{
      position:'absolute', inset:0, width:'100%', height:'100%',
      pointerEvents:'none', zIndex:0,
    }}/>
  );
}

/* ═══════════════════════════════════════════════════
   DITHER CANVAS — hero background
═══════════════════════════════════════════════════ */
function DitherCanvas({ dark }) {
  const canvasRef     = useRef(null);
  const wrapRef       = useRef(null);
  const videoRef      = useRef(null);
  const darkRef   = useRef(dark);
  useEffect(()=>{ darkRef.current = dark; }, [dark]);

  useEffect(()=>{
    const canvas = canvasRef.current;
    const video  = videoRef.current;
    if (!canvas || !video) return;

    const ctx  = canvas.getContext('2d');
    const smpl = document.createElement('canvas');
    const sctx = smpl.getContext('2d', { willReadFrequently:true });

    const PX=8, RADIUS=300, FORCE=6, WOBBLE=5, SPRING=0.06, DAMP=0.5;
    const BR=0.10, CT=2.4, GM=1.13;
    const LON=[241,242,243], LOFF=[253,254,255];
    const DON=[18,16,16],    DOFF=[0,0,0];
    const BAYER=[[0,2,0,2],[3,1,3,1],[0,2,0,2],[3,1,3,1]];
    const R2=RADIUS*RADIUS, IDLE_V=0.3, IDLE_D=(RADIUS+PX*2)**2;

    let particles=[], cols=0, rows=0, time=0, raf;
    let outBuf=null;
    let outImageData=null;
    let frameCount=0, cachedId=null;
    const mouse={ x:-9999, y:-9999 };

    class P {
      constructor(col,row){
        this.col=col; this.row=row;
        this.hx=(col+0.5)*PX; this.hy=(row+0.5)*PX;
        this.x=this.hx; this.y=this.hy;
        this.vx=0; this.vy=0;
        this.phase=Math.random()*Math.PI*2;
        this.r=255; this.g=255; this.b=255;
      }
      sample(id){
        const idx=(this.row*cols+this.col)*4;
        let lum=(0.299*id.data[idx]+0.587*id.data[idx+1]+0.114*id.data[idx+2])/255;
        lum=Math.pow(Math.max(0,lum),GM);
        lum=(lum-0.5)*CT+0.5;
        lum=Math.max(0,Math.min(1,lum+BR));
        const bl=darkRef.current?1-lum:lum;
        const thr=(BAYER[this.row&3][this.col&3]+0.5)/4;
        const ch=(bl<=thr)?(darkRef.current?DON:LON):(darkRef.current?DOFF:LOFF);
        this.r=ch[0]; this.g=ch[1]; this.b=ch[2];
      }
      update(){
        const dx=this.x-mouse.x, dy=this.y-mouse.y;
        const d2=dx*dx+dy*dy;
        if(d2>IDLE_D && Math.abs(this.vx)<IDLE_V && Math.abs(this.vy)<IDLE_V){
          this.x=this.hx; this.y=this.hy; this.vx=0; this.vy=0; return;
        }
        if(d2<R2&&d2>0.01){
          const d=Math.sqrt(d2), prx=1-d/RADIUS;
          this.vx+=(dx/d)*prx*FORCE;
          this.vy+=(dy/d)*prx*FORCE;
          const w=prx*prx*WOBBLE;
          this.vx+=Math.cos(time+this.phase)*w;
          this.vy+=Math.sin(time+this.phase*1.3)*w;
        }
        this.vx+=(this.hx-this.x)*SPRING;
        this.vy+=(this.hy-this.y)*SPRING;
        this.vx*=DAMP; this.vy*=DAMP;
        this.x+=this.vx; this.y+=this.vy;
      }
      paint(W){
        const gx=Math.floor(this.x/PX)*PX, gy=Math.floor(this.y/PX)*PX;
        const r=this.r, g=this.g, b=this.b;
        for(let dy=0;dy<PX;dy++){
          let base=((gy+dy)*W+gx)*4;
          for(let dx=0;dx<PX;dx++){
            outBuf[base]=r; outBuf[base+1]=g; outBuf[base+2]=b; outBuf[base+3]=255;
            base+=4;
          }
        }
      }
    }

    function build(){
      cols=Math.floor(canvas.width/PX);
      rows=Math.floor(canvas.height/PX);
      smpl.width=cols; smpl.height=rows;
      outBuf=new Uint8ClampedArray(canvas.width*canvas.height*4);
      outImageData=ctx.createImageData(canvas.width, canvas.height);
      particles=[];
      for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) particles.push(new P(c,r));
    }

    function setSize(){
      const vw=video.videoWidth||640, vh=video.videoHeight||360;
      canvas.width =Math.floor(vw*2/PX)*PX;
      canvas.height=Math.floor(vh*2/PX)*PX;
      canvas.style.width =canvas.width+'px';
      canvas.style.height=canvas.height+'px';
      build();
    }

    function loop(){
      raf=requestAnimationFrame(loop);
      time+=0.06; frameCount++;
      if(!outBuf||video.readyState<2) return;

      // Re-sample video every 2 frames
      if(frameCount%2===0){
        sctx.drawImage(video,0,0,cols,rows);
        cachedId=sctx.getImageData(0,0,cols,rows);
      }
      if(!cachedId) return;

      // Fill background with off-colour
      const bg=darkRef.current?DOFF:LOFF;
      outBuf.fill(0);
      const W=canvas.width;

      for(const p of particles){
        p.sample(cachedId);
        p.update();
        p.paint(W);
      }
      // Single putImageData instead of thousands of fillRect calls
      outImageData.data.set(outBuf);
      ctx.putImageData(outImageData, 0, 0);
    }

    const onMove = e=>{
      const r=canvas.getBoundingClientRect();
      mouse.x=e.clientX-r.left;
      mouse.y=e.clientY-r.top;
    };
    window.addEventListener('mousemove', onMove, {passive:true});
    video.addEventListener('loadedmetadata', setSize);
    setSize();

    // ── Intro animation: synchronous so centering applies before first paint ──
    {
      const wrap = wrapRef.current;
      if (wrap) {
        const cW = canvas.offsetWidth  || 1280;
        const cH = canvas.offsetHeight || 720;
        const initialScale = Math.min(196 / cW, 196 / cH);
        // Set position immediately — prevents grey flash on first frame
        gsap.set(wrap, { xPercent:-50, yPercent:-50, y: window.innerHeight*0.5, scale: initialScale });
        // Hold 2s, then scale+slide to final position over 0.5s
        gsap.to(wrap, { y:128, scale:1, duration:0.5, ease:'power2.inOut', delay:2 });

        // Counter: 00→99 over 2.5s, then remove
        const counter = document.getElementById('preloader-counter');
        if (counter) {
          const proxy = { v: 0 };
          gsap.to(proxy, {
            v: 99, duration: 2.5, ease: 'none',
            onUpdate: () => { counter.textContent = String(Math.floor(proxy.v)).padStart(2,'0'); },
            onComplete: () => { counter.style.display = 'none'; }
          });
        }
      }
    }

    video.play().catch(()=>{});
    loop();

    return ()=>{
      cancelAnimationFrame(raf);
      window.removeEventListener('mousemove', onMove);
    };
  },[]);

  return (
    <>
      <video ref={videoRef} src="videos/thumbnail_02.mp4" autoPlay muted loop playsInline
        crossOrigin="anonymous"
        style={{position:'absolute',opacity:0,width:1,height:1,pointerEvents:'none'}}
      />
      {/* GSAP owns all transform/position on this wrapper */}
      <div ref={wrapRef} style={{position:'absolute',left:'50%',top:0,zIndex:0,pointerEvents:'none'}}>
        <canvas ref={canvasRef} style={{display:'block',opacity:0.9}}/>
      </div>
    </>
  );
}

      const tR = initThumbRect.current;
      const rR = initReelRect.current;
      const thumbEl   = heroThumbRef.current;
      const reelEl    = reelPlayerRef.current;
      const overlayEl = document.getElementById("thumb-overlay");
      if (!tR || !rR || !thumbEl || !reelEl || !overlayEl) return;

      const scrollY = scrollYRef.current;
      const vpH     = window.innerHeight;
      const TO_TOP  = vpH * 0.25;
      const END     = Math.max(rR.top - TO_TOP, 1);
      const tp      = Math.min(Math.max(scrollY / END, 0), 1);

      if (scrollY <= 2) {
        thumbEl.style.opacity   = "1";
        overlayEl.style.opacity = "0";
        reelEl.style.opacity    = "0";
        return;
      }

      thumbEl.style.opacity = "0";

      if (tp >= 1) {
        overlayEl.style.opacity = "0";
        reelEl.style.opacity    = "1";
        return;
      }

      reelEl.style.opacity    = "0";
      overlayEl.style.display = "block";
      overlayEl.style.opacity = "1";

      const fromTop = tR.top - scrollY;
      overlayEl.style.top    = lerp(fromTop,   TO_TOP,  tp) + "px";
      overlayEl.style.left   = lerp(tR.left,   rR.left, tp) + "px";
      overlayEl.style.width  = lerp(tR.width,  rR.width,  tp) + "px";
